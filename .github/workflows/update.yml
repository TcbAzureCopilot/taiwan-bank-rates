name: Auto Update Exchange Rates

on:
  schedule:
    # 使用 UTC 時間 (台灣時間 UTC+8)
    # 這裡設定 UTC 1-8 點的 0 分執行 (相當於台灣時間 09:00 - 16:00)
    - cron: '0 1-8 * * 1-5'
  workflow_dispatch: # 這個設定讓我們可以在網頁上「手動點擊」執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        # 這是一個現成的套件，會自動幫我們把產生的 rates.json 存回專案裡
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自動更新匯率資料"
          file_pattern: 'rates.json'
